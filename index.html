<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ball-Trap Pro</title>
    <style>
        :root {
            --clay-orange: #ff5f00; --gold: #c5a059; --bg-neutral: #121212; --text-light: #f0f0f0;
            --btn-green: #2ecc71; --btn-orange: #f39c12; --btn-red: #e74c3c; --input-bg: #1e1e1e;
        }
        body { font-family: sans-serif; margin: 0; background: var(--bg-neutral); color: var(--text-light); height: 100vh; overflow: hidden; }
        .page { display: none; flex-direction: column; align-items: center; height: 100%; width: 100%; padding: 30px 20px; box-sizing: border-box; }
        .active { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #page-home { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('fond.jpg'); background-size: cover; background-position: center; justify-content: center; }
        .btn-start { background: var(--clay-orange); color: white; border: none; padding: 22px 70px; border-radius: 6px; font-size: 18px; font-weight: bold; position: absolute; bottom: 80px; }
        .section-title { font-size: 18px; font-weight: bold; color: var(--gold); text-transform: uppercase; margin-bottom: 25px; }
        .menu-list { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
        .folder-btn { background: #252525; border: 1px solid var(--gold); padding: 25px; border-radius: 15px; width: 100%; box-sizing: border-box; }
        .card-menu { background: #1e1e1e; border: 1px solid rgba(197,160,89,0.3); padding: 22px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .btn-confirm { background: var(--gold); color: black; border: none; padding: 18px; border-radius: 8px; font-weight: bold; width: 100%; max-width: 340px; }
        .btn-back { background: none; border: none; color: #666; font-size: 12px; text-transform: uppercase; padding: 20px; margin-top: auto; }
        .tabs { display: flex; gap: 5px; width: 100%; max-width: 380px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px 2px; background: #222; border: 1px solid #333; color: #666; font-size: 10px; border-radius: 6px; }
        .tab-btn.active { background: var(--gold); color: black; }
        .history-container { width: 100%; max-width: 380px; overflow-y: auto; flex: 1; }
        .history-card { background: #1a1a1a; border-left: 4px solid var(--gold); padding: 15px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .h-val { font-size: 18px; font-weight: 800; color: var(--btn-green); }
        .btn-delete { background: none; border: none; color: #e74c3c; font-size: 18px; padding: 10px; }
        .grid-25 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 300px; margin-bottom: 15px; }
        .cell { aspect-ratio: 1; background: #222; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
        .cell.hit1 { background: var(--btn-green); color: white; } .cell.hit2 { background: var(--btn-orange); color: white; } .cell.miss { background: var(--btn-red); color: white; }
        .controls { display: flex; gap: 10px; width: 100%; max-width: 340px; margin-top: auto; }
        .control-btn { flex: 1; height: 75px; border: none; border-radius: 12px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="page-home" class="page active"><button class="btn-start" onclick="showPage('page-main-folders')">Entrer</button></div>

    <div id="page-main-folders" class="page">
        <div class="section-title">Mes Dossiers</div>
        <div class="menu-list">
            <div class="folder-btn" onclick="openFolder('perso')"><div style="font-weight:bold; color:var(--gold);">👤 MES SCORES PERSO</div></div>
            <div class="folder-btn" onclick="openFolder('coach')"><div style="font-weight:bold; color:var(--gold);">🎓 DOSSIER ÉLÈVES</div></div>
        </div>
        <button class="btn-back" onclick="showPage('page-home')">← Quitter</button>
    </div>

    <div id="page-selection" class="page">
        <div class="section-title" id="selection-title">Discipline</div>
        <div class="menu-list">
            <div class="card-menu" onclick="selectDisc('Fosse Universelle')">FOSSE UNIVERSELLE <span>→</span></div>
            <div class="card-menu" onclick="selectDisc('DTL')">DTL <span>→</span></div>
            <div class="card-menu" onclick="selectDisc('Trap 1')">TRAP 1 <span>→</span></div>
            <div class="card-menu" onclick="goToHistory()" style="margin-top:20px; border-color:var(--gold); color:var(--gold)">📂 VOIR LES ARCHIVES</div>
        </div>
        <button class="btn-back" onclick="showPage('page-main-folders')">← Dossiers</button>
    </div>

    <div id="page-config" class="page">
        <div class="section-title">Détails</div>
        <input type="text" id="input-tireur" style="width:100%; max-width:340px; background:#1e1e1e; border:1px solid #333; padding:15px; color:white; border-radius:8px; margin-bottom:15px;" placeholder="Nom">
        <input type="text" id="input-stand" style="width:100%; max-width:340px; background:#1e1e1e; border:1px solid #333; padding:15px; color:white; border-radius:8px; margin-bottom:15px;" placeholder="Stand">
        <button class="btn-confirm" onclick="goToNextStep()">Démarrer</button>
        <button class="btn-back" onclick="showPage('page-selection')">← Retour</button>
    </div>

    <div id="page-score-perso" class="page">
        <div class="section-title">Score Final</div>
        <input type="number" id="input-score-simple" style="width:100%; max-width:340px; background:#1e1e1e; border:1px solid #333; padding:20px; color:white; border-radius:8px; font-size:30px; text-align:center;" placeholder="0">
        <button class="btn-confirm" style="margin-top:20px" onclick="saveSimpleScore()">Enregistrer</button>
    </div>

    <div id="page-coaching" class="page">
        <div id="score-display" style="font-size:30px; color:var(--gold); font-weight:bold; margin-bottom:15px">0 / 25</div>
        <div class="grid-25" id="grid"></div>
        <button id="btn-save-final" class="btn-confirm" style="display:none; margin-bottom:10px" onclick="confirmSaveCoaching()">Enregistrer</button>
        <div class="controls" id="input-controls">
            <button class="control-btn" style="background:var(--btn-green)" onclick="recordHit(1)">1er</button>
            <button class="control-btn" style="background:var(--btn-orange)" onclick="recordHit(2)">2ème</button>
            <button class="control-btn" style="background:var(--btn-red)" onclick="recordHit(0)">ZÉRO</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="section-title" id="history-title">Archives</div>
        <div class="tabs">
            <button class="tab-btn" id="tab-fu" onclick="refreshHistory('Fosse Universelle')">FU</button>
            <button class="tab-btn" id="tab-dtl" onclick="refreshHistory('DTL')">DTL</button>
            <button class="tab-btn" id="tab-trap1" onclick="refreshHistory('Trap 1')">Trap 1</button>
        </div>
        <div class="history-container" id="history-list"></div>
        <button class="btn-back" onclick="showPage('page-selection')">← Retour</button>
    </div>

    <script>
        let currentFolder = ''; let sessionData = { disc: '', tireur: '', stand: '', plateaux: [] };

        window.onload = function() {
            // RECHERCHE AGRESSIVE DES DONNÉES
            let b1 = JSON.parse(localStorage.getItem('bt_archives') || '[]');
            let b2 = JSON.parse(localStorage.getItem('bt_archives_v2') || '[]');
            let total = [...b1, ...b2];
            
            if (total.length > 0) {
                // On normalise tout dans la V2 et on marque en 'perso' si le dossier est inconnu
                let final = total.map(a => ({
                    id: a.id || Date.now() + Math.random(),
                    folder: a.folder || (a.mode === 'coaching' ? 'coach' : 'perso'),
                    date: a.date || 'Ancien',
                    disc: a.disc || a.discipline || 'Fosse Universelle',
                    tireur: a.tireur || 'Moi',
                    stand: a.stand || 'Stand',
                    score: a.score || '0'
                }));
                localStorage.setItem('bt_archives_v2', JSON.stringify(final));
                localStorage.removeItem('bt_archives'); // Nettoyage
            }
        };

        function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById(p).classList.add('active'); }
        function openFolder(t) { currentFolder = t; showPage('page-selection'); }
        function selectDisc(n) { sessionData.disc = n; showPage('page-config'); }
        function goToNextStep() {
            sessionData.tireur = document.getElementById('input-tireur').value || 'Moi';
            sessionData.stand = document.getElementById('input-stand').value || 'Stand';
            if(currentFolder === 'perso') showPage('page-score-perso');
            else { sessionData.plateaux = []; initGrid(); showPage('page-coaching'); }
        }
        function saveSimpleScore() { saveData(document.getElementById('input-score-simple').value + (sessionData.disc === 'Fosse Universelle' ? ' / 25' : ' / 75')); }
        function initGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for (let i = 0; i < 25; i++) { const c = document.createElement('div'); c.className = 'cell'; c.innerText = i + 1; c.id = 'cell-'+i; g.appendChild(c); }
            updateGrid();
        }
        function recordHit(s) { if(sessionData.plateaux.length < 25) { sessionData.plateaux.push(s); updateGrid(); } }
        function updateGrid() {
            let pts = 0;
            sessionData.plateaux.forEach((v, i) => {
                document.getElementById('cell-'+i).className = 'cell ' + (v===1?'hit1':v===2?'hit2':v===0?'miss':'');
                if(sessionData.disc==='Fosse Universelle') pts += (v>0?1:0); else pts += (v===1?3:v===2?2:0);
            });
            document.getElementById('score-display').innerText = pts + (sessionData.disc==='Fosse Universelle' ? ' / 25' : ' / 75');
            document.getElementById('btn-save-final').style.display = (sessionData.plateaux.length === 25 ? 'block' : 'none');
        }
