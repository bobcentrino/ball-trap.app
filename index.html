<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ball-Trap Pro V6.6</title>
    <style>
        :root {
            --primary: #007AFF; --success: #34C759; --warning: #FF9500; --danger: #FF3B30;
            --bg-light: #F2F2F7; --card-bg: #FFFFFF; --text-main: #1C1C1E; --text-sec: #8E8E93;
        }
        body, html { margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg-light); height: 100vh; width: 100%; overflow: hidden; }
        
        /* STRUCTURE FLEXIBLE */
        .flex-page { display: none; flex-direction: column; height: 100vh; padding: 15px; box-sizing: border-box; }
        .header { flex-shrink: 0; margin-bottom: 10px; }
        .content { flex-grow: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .footer { flex-shrink: 0; padding-top: 10px; }

        #page-accueil { background: #1c1c1e url('fond.jpg') center/cover; justify-content: center; align-items: center; text-align: center; color: white; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn-menu { width: 100%; background: white; border: none; padding: 20px; border-radius: 15px; margin-bottom: 10px; font-size: 1.1rem; font-weight: 600; text-align: left; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-action { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        
        /* GRILLE & GRAPH */
        .grid-trap { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .tile { aspect-ratio: 1; border-radius: 6px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
        .v { background: var(--success); color: white; } .o { background: var(--warning); color: white; } .r { background: var(--danger); color: white; }
        
        .graph-container { height: 180px; position: relative; margin: 25px 0 10px 30px; border-left: 1px solid #ccc; border-bottom: 1px solid #ccc; }
        .y-axis { position: absolute; left: -25px; height: 100%; display: flex; flex-direction: column-reverse; justify-content: space-between; font-size: 0.7rem; color: var(--text-sec); }
        .dot { width: 6px; height: 6px; background: white; border: 2px solid var(--primary); border-radius: 50%; position: absolute; transform: translate(-50%, 50%); }

        /* SAISIE BASSE */
        .saisie-bottom { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-saisie { height: 70px; border-radius: 15px; border: none; color: white; font-size: 1.5rem; font-weight: 800; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="page-accueil" class="flex-page" style="display: flex;">
        <h1 style="font-size: 2.5rem; margin: 0;">BALL-TRAP PRO</h1>
        <button class="btn-action" style="width: auto; padding: 15px 50px; border-radius: 40px; background: rgba(255,255,255,0.2); color:white; border:1px solid white; margin-top:30px;" onclick="nav('page-menu')">ENTRER</button>
    </div>

    <div id="page-menu" class="flex-page">
        <div class="header"><h2>Dossiers</h2></div>
        <div class="content">
            <button class="btn-menu" onclick="prepSaisie('perso')">👤 Mes Scores Perso<span>❯</span></button>
            <button class="btn-menu" onclick="prepSaisie('eleve')">🎓 Suivi mes Élèves<span>❯</span></button>
            <button class="btn-menu" onclick="nav('page-archives-choix')">📁 Archives<span>❯</span></button>
        </div>
        <div class="footer"><button class="btn-action" style="background:var(--danger); color:white;" onclick="nav('page-accueil')">Sortie</button></div>
    </div>

    <div id="page-config" class="flex-page">
        <div class="header"><h2>Configuration</h2></div>
        <div class="content">
            <div class="card">
                <input type="text" id="cfg-nom" placeholder="Nom">
                <select id="cfg-disc">
                    <option value="FU">Fosse Universelle (25 pts)</option>
                    <option value="DTL">DTL / Trap 1 (75 pts)</option>
                </select>
                <div id="zone-perso-direct" style="display:none;">
                    <input type="number" id="cfg-score-final" placeholder="Score Final">
                </div>
                <button class="btn-action" style="background:var(--primary); color:white; margin-top:10px;" onclick="validerConfig()">LANCER</button>
                <button class="btn-action" style="background:none; color:var(--text-sec);" onclick="nav('page-menu')">Annuler</button>
            </div>
        </div>
    </div>

    <div id="page-coaching" class="flex-page">
        <div class="header" style="text-align:center;">
            <b id="coach-titre">Élève</b>
            <div id="coach-score" style="font-size:2rem; font-weight:900; color:var(--primary);">0</div>
        </div>
        <div class="content">
            <div class="card">
                <div class="grid-trap" id="coach-grid"></div>
                <button class="btn-action" style="background:#eee; margin-top:10px; font-size:0.8rem;" onclick="corriger()">CORRECTION</button>
            </div>
        </div>
        <div class="footer">
            <button id="btn-save-coach" class="btn-action" style="display:none; background:var(--success); color:white; height:60px; margin-bottom:10px;" onclick="sauverEleve()">ENREGISTRER</button>
            <div class="saisie-bottom" id="touches-coach">
                <button class="btn-saisie" style="background:var(--success)" onclick="touch(1)">V</button>
                <button class="btn-saisie" style="background:var(--warning)" onclick="touch(2)">O</button>
                <button class="btn-saisie" style="background:var(--danger)" onclick="touch(0)">R</button>
            </div>
        </div>
    </div>

    <div id="page-archives-choix" class="flex-page">
        <div class="header"><button onclick="nav('page-menu')" style="background:none; border:none; color:var(--primary);">❮ Retour</button><h2>Archives</h2></div>
        <div class="content">
            <button class="btn-menu" onclick="ouvrirArchiveListe('perso')">📂 Mes Scores Perso<span>❯</span></button>
            <button class="btn-menu" onclick="ouvrirArchiveListe('eleve')">📂 Scores Élèves<span>❯</span></button>
        </div>
    </div>

    <div id="page-archives-liste" class="flex-page">
        <div class="header"><button onclick="nav('page-archives-choix')" style="background:none; border:none; color:var(--primary);">❮ Dossiers</button><h2 id="arch-liste-titre">Liste</h2></div>
        <div class="content" id="container-liste"></div>
    </div>

    <div id="page-detail" class="flex-page">
        <div class="header"><button onclick="nav('page-archives-liste')" style="background:none; border:none; color:var(--primary);">❮ Retour</button><h2>Détail</h2></div>
        <div class="content" id="detail-content"></div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('trap_master_db')) || { perso: [], eleve: [] };
        let cur = { mode: '', scores: [] };

        function nav(id) {
            document.querySelectorAll('.flex-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        function prepSaisie(mode) {
            cur.mode = mode;
            document.getElementById('zone-perso-direct').style.display = (mode === 'perso') ? 'block' : 'none';
            document.getElementById('cfg-nom').placeholder = (mode === 'perso') ? 'Lieu / Stand' : 'Nom de l\'élève';
            nav('page-config');
        }

        function validerConfig() {
            cur.nom = document.getElementById('cfg-nom').value || "Inconnu";
            cur.disc = document.getElementById('cfg-disc').value;
            if(cur.mode === 'perso') {
                const s = parseInt(document.getElementById('cfg-score-final').value);
                data.perso.push({ nom: cur.nom, disc: cur.disc, total: s, date: new Date().toISOString() });
                save(); nav('page-menu');
            } else {
                cur.scores = []; document.getElementById('coach-titre').innerText = cur.nom;
                document.getElementById('btn-save-coach').style.display='none';
                document.getElementById('touches-coach').style.display='grid';
                refreshGrid(); nav('page-coaching');
            }
        }

        function touch(c) {
            if(cur.scores.length >= 25) return;
            let p = (cur.disc === 'FU') ? (c > 0 ? 1 : 0) : (c === 1 ? 3 : (c === 2 ? 2 : 0));
            cur.scores.push({c, p}); refreshGrid();
            if(cur.scores.length === 25) {
                document.getElementById('btn-save-coach').style.display='block';
                document.getElementById('touches-coach').style.display='none';
            }
        }

        function refreshGrid() {
            const g = document.getElementById('coach-grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) {
                const t = document.createElement('div'); t.className = 'tile'; t.innerText = i+1;
                if(cur.scores[i]) {
                    const s = cur.scores[i];
                    if(s.c === 1) t.classList.add('v'); else if(s.c === 2) t.classList.add('o'); else if(s.c === 0) t.classList.add('r');
                }
                g.appendChild(t);
            }
            document.getElementById('coach-score').innerText = cur.scores.reduce((a,b)=>a+b.p,0);
        }

        function corriger() { 
            cur.scores.pop(); 
            document.getElementById('btn-save-coach').style.display='none';
            document.getElementById('touches-coach').style.display='grid';
            refreshGrid(); 
        }

        function sauverEleve() {
            data.eleve.push({ nom: cur.nom, disc: cur.disc, scores: cur.scores, total: cur.scores.reduce((a,b)=>a+b.p,0), date: new Date().toISOString() });
            save(); nav('page-menu');
        }

        function ouvrirArchiveListe(mode) {
            cur.mode = mode;
            document.getElementById('arch-liste-titre').innerText = (mode === 'perso') ? "Mes Scores" : "Élèves";
            const cont = document.getElementById('container-liste'); cont.innerHTML = '';
            data[mode].slice().reverse().forEach((s, i) => {
                const b = document.createElement('button'); b.className = 'btn-menu';
                b.innerHTML = `<div><b>${s.nom}</b><br><small>${s.disc} - ${new Date(s.date).toLocaleDateString()}</small></div><b>${s.total}</b>`;
                b.onclick = () => voirDetail(s, mode);
                cont.appendChild(b);
            });
            nav('page-archives-liste');
        }

        function voirDetail(s, mode) {
            const cont = document.getElementById('detail-content');
            let html = `<div class="card" style="text-align:center;"><h3>${s.nom}</h3><p>${s.disc} - ${new Date(s.date).toLocaleString()}</p><h1 style="color:var(--warning); font-size:3rem;">${s.total}</h1></div>`;
            if(mode === 'eleve') {
                html += `<div class="card"><div class="grid-trap">`;
                s.scores.forEach((p, i) => {
                    let cl = p.c === 1 ? 'v' : (p.c === 2 ? 'o' : 'r');
                    html += `<div class="tile ${cl}">${i+1}</div>`;
                });
                html += `</div></div><div class="card"><div class="graph-container"><div class="y-axis"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span><span>25</span></div><div id="graph-body"></div></div></div>`;
            }
            html += `<button class="btn-action" style="background:var(--danger); color:white;" onclick="supprimer('${s.date}', '${mode}')">SUPPRIMER CETTE FICHE</button>`;
            cont.innerHTML = html; nav('page-detail');
            if(mode === 'eleve') setTimeout(() => drawGraph(s.scores), 50);
        }

        function drawGraph(sc) {
            const b = document.getElementById('graph-body'); let cum = 0;
            sc.forEach((s, i) => {
                if(s.p > 0) cum++;
                const d = document.createElement('div'); d.className = 'dot';
                d.style.left = `${(i+1)*4}%`; d.style.bottom = `${cum*4}%`;
                b.appendChild(d);
            });
        }

        function supprimer(date, mode) {
            if(confirm("Supprimer ?")) {
                data[mode] = data[mode].filter(s => s.date !== date);
                save(); ouvrirArchiveListe(mode);
            }
        }

        function save() { localStorage.setItem('trap_master_db', JSON.stringify(data)); }
    </script>
</body>
</html>
