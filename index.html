<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ball-Trap Scores & Coaching</title>
    <style>
        :root {
            --clay-orange: #ff5f00;
            --gold: #c5a059;
            --bg-neutral: #121212;
            --text-light: #f0f0f0;
            --btn-green: #2ecc71;
            --btn-orange: #f39c12;
            --btn-red: #e74c3c;
            --input-bg: #1e1e1e;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background: var(--bg-neutral);
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            height: 100%;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        #page-home {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('fond.jpg');
            background-size: cover; background-position: center;
            justify-content: center;
        }

        .active { display: flex; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-start {
            background: var(--clay-orange); color: white; border: none;
            padding: 22px 70px; border-radius: 6px;
            font-size: 18px; font-weight: bold; text-transform: uppercase;
            position: absolute; bottom: 80px; box-shadow: 0 4px 20px rgba(0,0,0,0.7);
        }

        .section-title { font-size: 20px; font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; color: var(--gold); text-transform: uppercase; text-align: center; }
        .menu-list { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 15px; }
        
        .card-menu {
            background: #1e1e1e; border: 1px solid rgba(197, 160, 89, 0.3);
            padding: 25px 20px; border-radius: 12px; color: white; font-size: 15px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }

        .form-group { width: 100%; max-width: 340px; margin-bottom: 25px; }
        .form-group label { display: block; color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; font-weight: bold; }
        .form-group input { 
            width: 100%; background: var(--input-bg); border: 1px solid #333; 
            padding: 15px; border-radius: 8px; color: white; font-size: 22px; box-sizing: border-box;
            text-align: center;
        }

        .btn-confirm { 
            background: var(--gold); color: black; border: none; 
            padding: 18px 40px; border-radius: 8px; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 1px; width: 100%; max-width: 340px;
        }

        .info-bar { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; text-align: center; }
        .btn-back { background: none; border: none; color: #666; font-size: 13px; text-transform: uppercase; padding: 15px; cursor: pointer; margin-top: auto; }
        
        /* --- SYSTÈME D'ONGLETS POUR L'HISTORIQUE --- */
        .tabs { display: flex; gap: 5px; width: 100%; max-width: 380px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 10px 5px; background: #222; border: 1px solid #333; 
            color: #666; font-size: 10px; font-weight: bold; border-radius: 6px; 
            text-transform: uppercase; cursor: pointer;
        }
        .tab-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        #history-list { width: 100%; max-width: 380px; overflow-y: auto; flex: 1; padding-bottom: 20px; }
        .history-card { 
            background: #1a1a1a; border-left: 4px solid var(--gold); 
            padding: 15px; margin-bottom: 12px; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeIn 0.3s;
        }
        .history-info div { margin-bottom: 4px; }
        .h-date { font-size: 10px; color: #666; }
        .h-disc { font-size: 14px; font-weight: bold; color: var(--gold); }
        .h-stand { font-size: 12px; color: #aaa; }
        .history-score { text-align: right; display: flex; align-items: center; gap: 10px; }
        .h-val { font-size: 18px; font-weight: bold; color: var(--btn-green); }
        .btn-delete { background: none; border: none; color: #e74c3c; font-size: 18px; padding: 10px; cursor: pointer; }

        /* --- GRILLE --- */
        .score-main { font-size: 28px; color: var(--gold); font-weight: bold; margin-bottom: 10px; }
        .grid-25 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 320px; margin-bottom: 20px; }
        .cell { aspect-ratio: 1; background: #222; border: 1px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; }
        .cell.hit1 { background: var(--btn-green) !important; color: white !important; border-color: #fff !important; }
        .cell.hit2 { background: var(--btn-orange) !important; color: white !important; border-color: #fff !important; }
        .cell.miss { background: var(--btn-red) !important; color: white !important; border-color: #fff !important; }
        .controls { display: flex; gap: 12px; width: 100%; max-width: 340px; margin-top: auto; margin-bottom: 10px; }
        .control-btn { flex: 1; height: 80px; border: none; border-radius: 12px; color: white; font-weight: 800; font-size: 13px; text-transform: uppercase; }
        #btn-save-final { display: none; background: var(--gold); color: black; border: none; padding: 20px; border-radius: 10px; font-weight: 900; width: 100%; max-width: 340px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <button class="btn-start" onclick="showPage('page-selection')">Entrer</button>
    </div>

    <div id="page-selection" class="page">
        <div class="section-title">Disciplines</div>
        <div class="menu-list">
            <div class="card-menu" onclick="selectDisc('Fosse Universelle')">FOSSE UNIVERSELLE <span>→</span></div>
            <div class="card-menu" onclick="selectDisc('DTL')">DTL <span>→</span></div>
            <div class="card-menu" onclick="selectDisc('Trap 1')">TRAP 1 <span>→</span></div>
            <div class="card-menu" onclick="openHistory('Fosse Universelle')" style="margin-top:20px; border-color:var(--gold); color:var(--gold)">📊 MES ARCHIVES</div>
        </div>
        <button class="btn-back" onclick="showPage('page-home')">← Retour</button>
    </div>

    <div id="page-mode" class="page">
        <div class="section-title" id="mode-title-disc">Discipline</div>
        <div class="menu-list">
            <div class="card-menu" onclick="setMode('entrainement')">MES SCORES <br><small style="font-weight:normal; opacity:0.6">Saisie rapide après le tir</small> <span>→</span></div>
            <div class="card-menu" onclick="setMode('coaching')">COACHING ÉLÈVE <br><small style="font-weight:normal; opacity:0.6">Grille détaillée plateau par plateau</small> <span>→</span></div>
        </div>
        <button class="btn-back" onclick="showPage('page-selection')">← Retour</button>
    </div>

    <div id="page-config" class="page">
        <div class="section-title">Détails</div>
        <div class="form-group">
            <label>Nom du Tireur</label>
            <input type="text" id="input-tireur">
        </div>
        <div class="form-group">
            <label>Stand de Tir</label>
            <input type="text" id="input-stand">
        </div>
        <button class="btn-confirm" onclick="goToNextStep()">Continuer</button>
        <button class="btn-back" onclick="showPage('page-mode')">← Retour</button>
    </div>

    <div id="page-entrainement-simple" class="page">
        <div class="section-title">Score Final</div>
        <div class="info-bar" id="simple-info">FU • STAND</div>
        <div class="form-group" style="margin-top:20px">
            <label id="label-score-simple">Ton score final</label>
            <input type="number" id="input-score-simple" placeholder="0">
        </div>
        <button class="btn-confirm" onclick="saveSimpleScore()">Enregistrer ma planche</button>
        <button class="btn-back" onclick="showPage('page-config')">← Retour</button>
    </div>

    <div id="page-coaching" class="page">
        <div class="info-bar" id="coaching-info">COACHING</div>
        <div class="score-main" id="score-display">0 / 25</div>
        <div class="grid-25" id="grid"></div>
        <button id="btn-save-final" onclick="confirmSaveCoaching()">Enregistrer la séance</button>
        <div class="controls" id="input-controls">
            <button class="control-btn" style="background:var(--btn-green)" onclick="recordHit(1)">1er</button>
            <button class="control-btn" style="background:var(--btn-orange)" onclick="recordHit(2)">2ème</button>
            <button class="control-btn" style="background:var(--btn-red)" onclick="recordHit(0)">ZÉRO</button>
        </div>
        <button class="btn-undo" onclick="undoLast()" style="background:#333; color:#aaa; border:none; padding:10px 20px; border-radius:8px; font-size:12px; margin-top:10px;">⟲ Correction</button>
        <button class="btn-back" onclick="showPage('page-config')">← Retour</button>
    </div>

    <div id="page-history" class="page">
        <div class="section-title">Archives</div>
        
        <div class="tabs">
            <button class="tab-btn" id="tab-fu" onclick="openHistory('Fosse Universelle')">Fosse U.</button>
            <button class="tab-btn" id="tab-dtl" onclick="openHistory('DTL')">DTL</button>
            <button class="tab-btn" id="tab-trap1" onclick="openHistory('Trap 1')">Trap 1</button>
        </div>

        <div id="history-list"></div>
        
        <button class="btn-back" onclick="showPage('page-selection')">← Retour</button>
    </div>

    <script>
        let sessionData = { disc: '', tireur: '', stand: '', mode: '', plateaux: [] };

        window.onload = () => {
            if(localStorage.getItem('lastTireur')) document.getElementById('input-tireur').value = localStorage.getItem('lastTireur');
            if(localStorage.getItem('lastStand')) document.getElementById('input-stand').value = localStorage.getItem('lastStand');
        };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function selectDisc(name) {
            sessionData.disc = name;
            document.getElementById('mode-title-disc').innerText = name;
            showPage('page-mode');
        }
