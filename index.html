<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ball-Trap Pro v5.9.7</title>
    <style>
        :root { --clay: #ff5f00; --gold: #c5a059; --bg: #121212; --txt: #f0f0f0; --green: #2ecc71; --orange: #f39c12; --red: #e74c3c; --btn-back: #4a4a4a; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; box-sizing: border-box; }
        .page { display: none; flex-direction: column; align-items: center; height: 100%; width: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active { display: flex; }
        #p0 { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('fond.jpg'); background-size: cover; background-position: center; justify-content: flex-end; padding-bottom: 60px; }
        .btn-entrer { background: var(--clay); color: white; border: none; padding: 22px 70px; border-radius: 10px; font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .section-title { color: var(--gold); text-transform: uppercase; margin: 20px 0; font-weight: bold; text-align: center; }
        .card { background: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 12px; width: 100%; max-width: 320px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: var(--gold); color: black; border: none; padding: 18px; border-radius: 8px; font-weight: bold; width: 100%; max-width: 320px; text-transform: uppercase; margin-top: 10px; box-sizing: border-box; display: block; margin-left: auto; margin-right: auto; }
        .btn-back { background: var(--btn-back); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; max-width: 320px; margin-top: 15px; text-transform: uppercase; font-weight: bold; font-size: 14px; display: block; margin-left: auto; margin-right: auto; }
        input, select { width: 100%; max-width: 320px; background: #1e1e1e; border: 1px solid #444; padding: 14px; color: white; border-radius: 8px; margin-bottom: 8px; text-align: center; font-size: 16px; box-sizing: border-box; display: block; margin-left: auto; margin-right: auto; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 300px; margin-bottom: 20px; box-sizing: border-box; }
        .cell { aspect-ratio: 1; background: #222; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .hit1 { background: var(--green) !important; } .hit2 { background: var(--orange) !important; } .miss { background: var(--red) !important; }
        #graph-box { width: 100%; max-width: 320px; background: #111; border: 1px solid var(--gold); border-radius: 12px; padding: 10px; margin-bottom: 15px; display: none; box-sizing: border-box; }
        canvas { width: 100%; height: 150px; display: block; }
        .history-item { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 320px; border-left: 5px solid var(--gold); box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="p0" class="page active"><button class="btn-entrer" onclick="go('p1')">Entrer</button></div>
    <div id="p1" class="page"><div class="section-title">Dossiers</div><div class="card" onclick="setFolder('perso')">MES SCORES PERSO</div><div class="card" onclick="setFolder('coach')">DOSSIER ÉLÈVES</div><button class="btn-back" style="background:var(--red)" onclick="go('p0')">SORTIR</button></div>
    <div id="p2" class="page"><div class="section-title">Discipline</div><div class="card" onclick="setDisc('Fosse Universelle')">FOSSE UNIVERSELLE</div><div class="card" onclick="setDisc('DTL')">DTL</div><div class="card" onclick="setDisc('Trap 1')">TRAP 1</div><button class="btn-confirm" onclick="viewHistory()">📂 ARCHIVES</button><button class="btn-back" onclick="go('p1')">RETOUR</button></div>
    <div id="p3" class="page"><div class="section-title">Infos</div><input type="text" id="in-name" placeholder="Nom"><input type="text" id="in-stand" placeholder="Stand"><button class="btn-confirm" style="background:var(--clay); color:white" onclick="startSérie()">DÉMARRER</button><button class="btn-back" onclick="go('p2')">RETOUR</button></div>
    <div id="p4" class="page"><div class="section-title">Score Rapide</div><input type="number" id="in-score" placeholder="Points"><button class="btn-confirm" onclick="savePerso()">SAUVER</button><button class="btn-back" onclick="go('p1')">RETOUR</button></div>
    <div id="p5" class="page">
        <div id="score-live" style="font-size:28px; color:var(--gold); font-weight:bold; margin:20px 0;">0 / 25</div>
        <div id="graph-box"><canvas id="cvs"></canvas></div>
        <div class="grid" id="grid"></div>
        <div id="coach-controls" style="display:flex; gap:10px; width:100%; max-width:320px;">
            <button onclick="hit(1)" style="flex:1; background:var(--green); height:60px; border:none; border-radius:12px; color:white; font-weight:bold">1er</button>
            <button onclick="hit(2)" style="flex:1; background:var(--orange); height:60px; border:none; border-radius:12px; color:white; font-weight:bold">2ème</button>
            <button onclick="hit(0)" style="flex:1; background:var(--red); height:60px; border:none; border-radius:12px; color:white; font-weight:bold">ZÉRO</button>
        </div>
        <div id="edit-controls" style="display:flex; gap:10px; width:100%; max-width:320px; margin-top:10px">
            <button onclick="undoHit()" style="flex:1; background:#444; border:none; padding:12px; border-radius:8px; color:white">⟲ Corriger</button>
            <button onclick="if(confirm('Arrêter ?')) go('p1')" style="flex:1; background:#800; border:none; padding:12px; border-radius:8px; color:white">⨉ Quitter</button>
        </div>
        <button id="btn-save-coach" class="btn-confirm" style="display:none; background:var(--clay); color:white" onclick="saveCoach()">ENREGISTRER</button>
        <button id="btn-close-view" class="btn-back" onclick="viewHistory()">RETOUR ARCHIVES</button>
    </div>
    <div id="p6" class="page">
        <div class="section-title">Archives</div>
        <div id="hist-list" style="width:100%; max-width:320px;"></div>
        <button class="btn-confirm" style="background:#333; color:white" onclick="exportData()">💾 EXPORTER DONNÉES</button>
        <label class="btn-confirm" style="background:#333; color:white; cursor:pointer; text-align:center;">
            📂 IMPORTER DONNÉES
            <input type="file" id="file-input" style="display:none" onchange="importData(event)">
        </label>
        <button class="btn-back" onclick="go('p2')">RETOUR</button>
    </div>
    <script>
        let curF='', curD='', pts=[];
        const go=(id)=>{document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');};
        function setFolder(f){curF=f;go('p2');}
        function setDisc(d){curD=d;document.getElementById('in-name').value=(curF==='perso'?'Moi':'');go('p3');}
        function startSérie(){pts=[];document.getElementById('graph-box').style.display='none';if(curF==='perso')go('p4');else{buildGrid();go('p5');document.getElementById('coach-controls').style.display='flex';document.getElementById('edit-controls').style.display='flex';document.getElementById('btn-save-coach').style.display='none';document.getElementById('btn-close-view').style.display='none';}}
        function buildGrid(){const g=document.getElementById('grid');g.innerHTML='';for(let i=0;i<25;i++)g.innerHTML+=`<div class="cell" id="c${i}">${i+1}</div>`;updateS();}
        function hit(v){if(pts.length<25){pts.push(v);updateS();}}
        function undoHit(){pts.pop();updateS();}
        function updateS(){let t=0;pts.forEach((v,i)=>{const el=document.getElementById('c'+i);if(el)el.className='cell '+(v===1?'hit1':v===2?'hit2':v===0?'miss':'');if(curD==='Fosse Universelle')t+=(v>0?1:0);else t+=(v===1?3:v===2?2:0);});document.getElementById('score-live').innerText=t+(curD==='Fosse Universelle'?' / 25':' / 75');document.getElementById('btn-save-coach').style.display=(pts.length>=25?'block':'none');document.getElementById('edit-controls').style.display=(pts.length>=25?'none':'flex');}
        function saveCoach(){finalSave(document.getElementById('score-live').innerText,pts);}
        function savePerso(){
            let val = parseInt(document.getElementById('in-score').value);
            let max = (curD === 'Fosse Universelle') ? 25 : 75;
            if(isNaN(val) || val < 0 || val > max){ alert("Score invalide ! Max: " + max); return; }
            finalSave(val + (curD === 'Fosse Universelle' ? ' / 25' : ' / 75'), []);
        }
        function finalSave(s,p){let db=JSON.parse(localStorage.getItem('BT_DATA')||'[]');db.unshift({id:Date.now(),folder:curF,disc:curD,name:document.getElementById('in-name').value,stand:document.getElementById('in-stand').value,score:s,date:new Date().toLocaleDateString('fr-FR'),details:p});localStorage.setItem('BT_DATA',JSON.stringify(db));alert("Enregistré !");go('p1');}
        function viewHistory(){
            const db=JSON.parse(localStorage.getItem('BT_DATA')||'[]');
            const studs=[...new Set(db.filter(a=>a.folder===curF).map(a=>a.name||'Inconnu'))];
            const discs=[...new Set(db.filter(a=>a.folder===curF).map(a=>a.disc))];
            const list=document.getElementById('hist-list');
            let html=`<div style="margin-bottom:15px">
                <select id="s-stud" onchange="applyFilters()" style="width:100%"><option value="all">Tous les élèves</option>`;
            studs.forEach(s=>html+=`<option value="${s}">${s}</option>`);
            html+=`</select><select id="s-disc" onchange="applyFilters()" style="width:100%"><option value="all">Toutes disciplines</option>`;
            discs.forEach(d=>html+=`<option value="${d}">${d}</option>`);
            html+=`</select></div><div id="filtered-container"></div>`;
            list.innerHTML=html;
            applyFilters();
            go('p6');
        }
        function applyFilters(){
            const n=document.getElementById('s-stud').value;
            const d=document.getElementById('s-disc').value;
            const db=JSON.parse(localStorage.getItem('BT_DATA')||'[]');
            const cont=document.getElementById('filtered-container');
            cont.innerHTML='';
            db.filter(a=>a.folder===curF && (n==='all' || a.name===n) && (d==='all' || a.disc===d)).forEach(a=>{
                cont.innerHTML+=`<div class="history-item" onclick="showDetails(${a.id})"><div><small>${a.date} | ${a.disc}</small><br>${a.name||'Score'}</div><div style="font-weight:900;color:var(--green)">${a.score}<button onclick="event.stopPropagation(); del(${a.id})" style="background:none;border:none;color:var(--red);margin-left:10px">🗑️</button></div></div>`;
            });
        }
        function del(id){if(confirm("Supprimer ?")){let db=JSON.parse(localStorage.getItem('BT_DATA')||'[]');db=db.filter(a=>a.id!==id);localStorage.setItem('BT_DATA',JSON.stringify(db));viewHistory();}}
        function showDetails(id){
            const db=JSON.parse(localStorage.getItem('BT_DATA')||'[]');
            const s=db.find(a=>a.id!==undefined && a.id===id);
            if(s){
                if(s.folder==='perso'){ alert("Score : "+s.score); return; }
                pts=s.details; buildGrid(); document.getElementById('graph-box').style.display='block';
                setTimeout(()=>{drawGraph(pts);},100); document.getElementById('coach-controls').style.display='none';
                document.getElementById('edit-controls').style.display='none'; document.getElementById('btn-save-coach').style.display='none';
                document.getElementById('btn-close-view').style.display='block'; go('p5');
            }
        }
        function drawGraph(data) {
    const canvas = document.getElementById('cvs');
    const ctx = canvas.getContext('2d');
    const cw = canvas.offsetWidth, ch = canvas.offsetHeight;
    canvas.width = cw * 2; canvas.height = ch * 2;
    ctx.scale(2, 2);
    
    const m = 35; 
    const w = cw, h = ch;
    const stepX = (w - m * 2) / 24; 
    const stepY = (h - m * 2) / 25;

    ctx.clearRect(0, 0, w, h);
    
    // 1. Quadrillage intérieur
    ctx.strokeStyle = "#444"; 
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=4; i<25; i+=5) { let x = m + (i * stepX); ctx.moveTo(x, m); ctx.lineTo(x, h-m); }
    for(let i=5; i<=25; i+=5) { let y = (h - m) - (i * stepY); ctx.moveTo(m, y); ctx.lineTo(w-m, y); }
    ctx.stroke();

    // 2. Axes principaux
    ctx.strokeStyle = "#888"; 
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(m, m); ctx.lineTo(m, h - m); 
    ctx.lineTo(w - m, h - m); 
    ctx.stroke();

    // 3. Graduations
    ctx.fillStyle = "#bbb"; 
    ctx.font = "bold 12px Arial";
    ctx.textAlign = "center";
    for(let i=4; i<25; i+=5) { ctx.fillText(i + 1, m + (i * stepX), h - 10); }
    ctx.textAlign = "right";
    for(let i=5; i<=25; i+=5) { ctx.fillText(i, m - 5, (h - m) - (i * stepY) + 5); }

    // 4. Courbe et points
    let curS = 0, lastX = m, lastY = h - m;
    data.forEach((val, i) => {
        let oldX = lastX, oldY = lastY;
        if(val > 0) curS++;
        const nX = m + (i * stepX);
        const nY = (h - m) - (curS * stepY);
        
        // Tracer la ligne
        ctx.strokeStyle = (val === 1 ? '#2ecc71' : (val === 2 ? '#f39c12' : '#e74c3c'));
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(oldX, oldY); ctx.lineTo(nX, nY); ctx.stroke();
        
        // Ajouter le petit point blanc (cercle)
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(nX, nY, 3, 0, Math.PI * 2); // Rayon de 3 pixels
        ctx.fill();
        ctx.strokeStyle = "#333"; // Petit contour pour mieux voir le point
        ctx.lineWidth = 1;
        ctx.stroke();
        
        lastX = nX; lastY = nY;
    });
}
        function exportData(){const data=localStorage.getItem('BT_DATA');if(!data){alert("Rien à exporter !");return;}const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download="backup_balltrap.json";a.click();}
        function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(e)=>{try{localStorage.setItem('BT_DATA',e.target.result);alert("Données importées !");location.reload();}catch(err){alert("Fichier invalide");}};r.readAsText(f);}
    </script>
</body>
</html>
