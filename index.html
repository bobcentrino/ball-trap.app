<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ball-Trap Pro</title>
    <style>
        :root { --clay: #ff5f00; --gold: #c5a059; --bg: #121212; --txt: #f0f0f0; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; }
        .page { display: none; flex-direction: column; align-items: center; height: 100%; width: 100%; padding: 25px; box-sizing: border-box; }
        .active { display: flex; }
        
        /* ACCUEIL - RETOUR DU LOOK D'ORIGINE */
        #p0 { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('fond.jpg'); background-size: cover; background-position: center; justify-content: center; }
        .btn-entrer { background: var(--clay); color: white; border: none; padding: 22px 70px; border-radius: 10px; font-size: 18px; font-weight: bold; text-transform: uppercase; position: absolute; bottom: 80px; box-shadow: 0 5px 20px rgba(0,0,0,0.6); }

        .section-title { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: bold; text-align: center; }
        .card { background: #1e1e1e; border: 1px solid #333; padding: 22px; border-radius: 12px; margin-bottom: 12px; width: 100%; max-width: 350px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; font-weight: bold; }
        .btn-confirm { background: var(--gold); color: black; border: none; padding: 18px; border-radius: 8px; font-weight: bold; width: 100%; max-width: 350px; text-transform: uppercase; margin-top: 10px; }
        .btn-back { background: none; border: none; color: #666; padding: 20px; text-transform: uppercase; font-size: 12px; margin-top: auto; }

        /* GRILLE */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 300px; margin-bottom: 10px; }
        .cell { aspect-ratio: 1; background: #222; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #555; }
        .hit1 { background: var(--green) !important; color: white !important; } 
        .hit2 { background: #f39c12 !important; color: white !important; } 
        .miss { background: var(--red) !important; color: white !important; }

        /* STATS - BLOC EN HAUT */
        #stats-area { width: 100%; max-width: 300px; background: #252525; padding: 15px; border-radius: 10px; border: 2px solid var(--gold); margin-bottom: 15px; display: none; box-sizing: border-box; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #fff; }
        .stat-line b { color: var(--gold); }

        /* ARCHIVES */
        .history-item { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 350px; box-sizing: border-box; border-left: 5px solid var(--gold); }
        .tabs { display: flex; gap: 5px; width: 100%; max-width: 350px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px 5px; background: #222; font-size: 10px; text-align: center; border-radius: 6px; color: #777; font-weight: bold; }
        .tab.active { background: var(--gold); color: black; }
        input { width: 100%; max-width: 350px; background: #1e1e1e; border: 1px solid #333; padding: 16px; color: white; border-radius: 8px; margin-bottom: 12px; text-align: center; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="p0" class="page active"><button class="btn-entrer" onclick="go('p1')">Entrer</button></div>

    <div id="p1" class="page">
        <div class="section-title">Mes Dossiers</div>
        <div class="card" onclick="setFolder('perso')">👤 MES SCORES PERSO <span>→</span></div>
        <div class="card" onclick="setFolder('coach')">🎓 DOSSIER ÉLÈVES <span>→</span></div>
        <button class="btn-back" onclick="go('p0')">Quitter</button>
    </div>

    <div id="p2" class="page">
        <div class="section-title" id="folder-name">Discipline</div>
        <div class="card" onclick="setDisc('Fosse Universelle')">FOSSE UNIVERSELLE</div>
        <div class="card" onclick="setDisc('DTL')">DTL</div>
        <div class="card" onclick="setDisc('Trap 1')">TRAP 1</div>
        <button class="btn-confirm" onclick="viewHistory()" style="margin-top:20px; border:1px solid var(--gold); background:none; color:var(--gold)">📂 VOIR ARCHIVES</button>
        <button class="btn-back" onclick="go('p1')">Retour</button>
    </div>

    <div id="p3" class="page">
        <div class="section-title">Nouvelle Série</div>
        <input type="text" id="in-name" placeholder="Nom du tireur">
        <input type="text" id="in-stand" placeholder="Stand">
        <button class="btn-confirm" onclick="startSérie()">Démarrer</button>
        <button class="btn-back" onclick="go('p2')">Retour</button>
    </div>

    <div id="p4" class="page">
        <div class="section-title">Score</div>
        <input type="number" id="in-score" placeholder="Points final">
        <button class="btn-confirm" onclick="savePerso()">Enregistrer</button>
    </div>

    <div id="p5" class="page">
        <div id="score-live" style="font-size:32px; color:var(--gold); font-weight:bold; margin-bottom:10px">0 / 25</div>
        
        <div id="stats-area">
            <div style="font-size:10px; font-weight:bold; color:var(--gold); margin-bottom:10px; text-align:center">BILAN DE PERFORMANCE</div>
            <div class="stat-line">Début (5p) : <b id="stat-start">0</b></div>
            <div class="stat-line">Milieu (15p) : <b id="stat-mid">0</b></div>
            <div class="stat-line">Fin (5p) : <b id="stat-end">0</b></div>
            <div class="stat-line" style="border-top:1px solid #444; margin-top:5px; padding-top:5px">Total Zéros : <b id="stat-zeros">0</b></div>
        </div>

        <div class="grid" id="grid"></div>
        
        <div id="coach-controls" style="display:flex; gap:10px; width:100%; max-width:350px; margin-top:auto; margin-bottom:15px">
            <button onclick="hit(1)" style="flex:1; background:var(--green); height:75px; border:none; border-radius:12px; color:white; font-weight:bold">1er</button>
            <button onclick="hit(2)" style="flex:1; background:#f39c12; height:75px; border:none; border-radius:12px; color:white; font-weight:bold">2ème</button>
            <button onclick="hit(0)" style="flex:1; background:var(--red); height:75px; border:none; border-radius:12px; color:white; font-weight:bold">ZÉRO</button>
        </div>
        <button id="btn-save-coach" class="btn-confirm" style="display:none" onclick="saveCoach()">Enregistrer la série</button>
        <button id="btn-close-view" class="btn-confirm" style="display:none; background:#444" onclick="go('p6')">Fermer la vue</button>
        <button class="btn-back" id="btn-cancel-tir" onclick="go('p3')">Annuler</button>
    </div>

    <div id="p6" class="page">
        <div class="section-title">Archives</div>
        <div class="tabs">
            <div id="t1" class="tab" onclick="refreshH('Fosse Universelle')">FOSSE U.</div>
            <div id="t2" class="tab" onclick="refreshH('DTL')">DTL</div>
            <div id="t3" class="tab" onclick="refreshH('Trap 1')">TRAP 1</div>
        </div>
        <div id="hist-list" style="width:100%; overflow-y:auto; flex:1"></div>
        <button class="btn-back" onclick="go('p2')">Retour</button>
    </div>

    <script>
        let curF = ''; let curD = ''; let pts = [];
        const go = (id) => { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); };
        
        function setFolder(f) { curF = f; document.getElementById('folder-name').innerText = f === 'perso' ? 'Mes Scores' : 'Coaching'; go('p2'); }
        function setDisc(d) { curD = d; document.getElementById('in-name').value = curF === 'perso' ? 'Moi' : ''; go('p3'); }
        
        function startSérie() {
            pts = []; 
            document.getElementById('stats-area').style.display = 'none';
            document.getElementById('coach-controls').style.display = (curF === 'coach' ? 'flex' : 'none');
            document.getElementById('btn-close-view').style.display = 'none';
            document.getElementById('btn-cancel-tir').style.display = 'block';
            if(curF === 'perso') go('p4'); else { buildGrid(); go('p5'); }
        }

        function buildGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=0; i<25; i++) g.innerHTML += `<div class="cell" id="c${i}">${i+1}</div>`;
            updateS();
        }

        function hit(v) { if(pts.length < 25) { pts.push(v); updateS(); } }
        
        function updateS() {
            let total = 0;
            pts.forEach((v, i) => {
                const el = document.getElementById('c'+i);
                if(el) {
                    el.className = 'cell ' + (v===1?'hit1':v===2?'hit2':v===0?'miss':'');
                    if(curD === 'Fosse Universelle') total += (v>0?1:0); else total += (v===1?3:v===2?2:0);
                }
            });
            document.getElementById('score-live').innerText = total + (curD === 'Fosse Universelle' ? ' / 25' : ' / 75');
            document.getElementById('btn-save-coach').style.display = (pts.length >= 25 ? 'block' : 'none');
        }

        function savePerso() { finalSave(document.getElementById('in-score').value + (curD === 'Fosse Universelle' ? ' / 25' : ' / 75'), []); }
        function saveCoach() { finalSave(document.getElementById('score-live').innerText, pts); }

        function finalSave(score, detailPts) {
            let db = JSON.parse(localStorage.getItem('BT_DATA') || '[]');
            db.unshift({ id: Date.now(), folder: curF, disc: curD, name: document.getElementById('in-name').value, stand: document.getElementById('in-stand').value, score: score, date: new Date().toLocaleDateString('fr-FR'), details: detailPts });
            localStorage.setItem('BT_DATA', JSON.stringify(db));
            alert("Série enregistrée !"); go('p1');
        }

        function viewHistory() { refreshH('Fosse Universelle'); go('p6'); }

        function refreshH(d) {
            const list = document.getElementById('hist-list');
            const db = JSON.parse(localStorage.getItem('BT_DATA') || '[]');
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            if(d==='Fosse Universelle') document.getElementById('t1').classList.add('active');
            if(d==='DTL') document.getElementById('t2').classList.add('active');
            if(d==='Trap 1') document.getElementById('t3').classList.add('active');

            const filtered = db.filter(a => a.folder === curF && a.disc === d);
            list.innerHTML = filtered.length ? '' : '<div style="text-align:center; padding:50px; color:#444">Aucune archive</div>';
            filtered.forEach(a => {
                let showBtn = (curF === 'coach' && a.details && a.details.length > 0) ? `<button onclick="showDetails(${a.id})" style="background:none; border:none; color:var(--gold); font-size:24px; margin-right:10px">👁️</button>` : '';
                list.innerHTML += `<div class="history-item"><div><small>${a.date}</small><br><b>${curF==='perso'?a.stand:a.name}</b></div><div style="display:flex; align-items:center">${showBtn}<span style="font-weight:900; color:var(--green); font-size:18px">${a.score}</span><button onclick="del(${a.id},'${d}')" style="background:none; border:none; color:var(--red); font-size:22px; margin-left:15px">🗑️</button></div></div>`;
            });
        }

        function showDetails(id) {
            const db = JSON.parse(localStorage.getItem('BT_DATA') || '[]');
            const s = db.find(a => a.id === id);
            if(s) {
                pts = s.details || []; curD = s.disc; buildGrid();
                let s1=0, s2=0, s3=0, sz=0;
                pts.forEach((v, i) => {
                    if(v > 0) { if(i<5) s1++; else if(i<20) s2++; else s3++; } else { sz++; }
                });
                document.getElementById('stat-start').innerText = s1 + " / 5";
                document.getElementById('stat-mid').innerText = s2 + " / 15";
                document.getElementById('stat-end').innerText = s3 + " / 5";
                document.getElementById('stat-zeros').innerText = sz;

                document.getElementById('stats-area').style.display = 'block';
                document.getElementById('coach-controls').style.display = 'none';
                document.getElementById('btn-save-coach').style.display = 'none';
                document.getElementById('btn-cancel-tir').style.display = 'none';
                document.getElementById('btn-close-view').style.display = 'block';
                go('p5');
            }
        }
        function del(id, d) { if(confirm("Supprimer cette série ?")) { let db = JSON.parse(localStorage.getItem('BT_DATA') || '[]'); db = db.filter(a=>a.id!==id); localStorage.setItem('BT_DATA', JSON.stringify(db)); refreshH(d); } }
    </script>
</body>
</html>
